services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "4174:8080"
    environment:
      - SEARXNG_REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - $HOME/.dockerdat/profile:/profile
      - $HOME/.dockerdat/data:/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
